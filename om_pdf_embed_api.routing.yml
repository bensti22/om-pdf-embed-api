om_pdf_embed_api.example:
  path: '/om-pdf-embed-api/example'
  defaults:
    _title: 'Example'
    _controller: '\Drupal\om_pdf_embed_api\Controller\OmPdfEmbedApiController::build'
  requirements:
    _permission: 'access content'

om_pdf_embed_api.settings_form:
  path: '/admin/config/system/om-pdf-embed-api'
  defaults:
    _title: 'OM PDF Embed API settings'
    _form: 'Drupal\om_pdf_embed_api\Form\SettingsForm'
  requirements:
    _permission: 'administer om_pdf_embed_api configuration'
